name: 🎯 後場シグナル通知（13:30）

on:
  schedule:
    - cron: '30 4 * * 1-5'
  workflow_dispatch:

jobs:
  afternoon-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt
      - name: 朝の結果をキャッシュから復元
        uses: actions/cache/restore@v4
        with:
          path: morning_result.json
          key: morning-signal-
          restore-keys: morning-signal-
      - name: 後場シグナルを実行してDiscordに通知
        env:
          JQUANTS_EMAIL: ${{ secrets.JQUANTS_EMAIL }}
          JQUANTS_PASSWORD: ${{ secrets.JQUANTS_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python main.py --mode afternoon --input morning_result.json
