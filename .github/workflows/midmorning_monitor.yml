name: 🔍 前場レビュー通知（10:30）

on:
  schedule:
    - cron: '33 1 * * 1-5'  # 毎日10:33 JST ← :30を避けて競合回避
  workflow_dispatch:

jobs:
  midmorning-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt
      - name: 朝の結果をキャッシュから復元
        uses: actions/cache/restore@v4
        with:
          path: morning_result.json
          key: morning-signal-
          restore-keys: morning-signal-
      - name: 前場レビューを実行してDiscordに通知
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python main.py --mode midmorning --input morning_result.json
